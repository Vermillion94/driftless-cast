# Fly.io deployment config for Driftless Cast.
#
# Setup (one-time):
#   1. brew install flyctl                       (or scoop install flyctl on Windows)
#   2. fly auth signup                           (or `fly auth login`)
#   3. fly launch --no-deploy --copy-config      (creates the app + accepts this fly.toml)
#   4. fly volumes create dc_data --size 1 --region ord  (1GB persistent storage for the SQLite DB)
#   5. fly deploy
#
# To redeploy after code changes:
#   fly deploy
#
# Logs:
#   fly logs
#
# SSH into a running instance (debugging):
#   fly ssh console
#
# Free-tier note: Fly.io's "Hobby" plan gives you 3 small shared-cpu VMs free.
# This config requests one 256MB shared-cpu-1x machine — well under the limit.

app = "driftless-cast"          # change to your fly app name (must be globally unique)
primary_region = "ord"          # Chicago — closest to the Driftless region

[build]

[env]
  SERVE_STATIC = "1"
  # SQLite lives on the persistent volume so catch_log entries and the cached
  # forecast survive `fly deploy`. We mount the volume at /data (NOT
  # /app/data — that path holds bundled seed JSON in the image and the volume
  # would shadow it).
  DC_DB_PATH = "/data/driftless_cast.db"
  # PYTHONUNBUFFERED is set by the Dockerfile.

[http_service]
  internal_port = 8000
  force_https = true
  # auto_stop_machines on a fishing forecast app is fine — the first request
  # after a sleep takes ~3-5s to wake. If that bothers you, set to "off".
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/openapi.json"

[[mounts]]
  source = "dc_data"
  destination = "/data"
  # Holds the SQLite DB (DC_DB_PATH=/data/driftless_cast.db). MUST NOT be
  # /app/data — that path contains seed JSON shipped in the image and the
  # volume would shadow it on first boot, leaving the DB unseed-able.

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
