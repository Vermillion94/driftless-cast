# Auto-deploy to Fly.io on every push to main.
#
# Setup (one-time):
#   1. flyctl tokens create deploy --expiry 0
#   2. gh secret set FLY_API_TOKEN -b "<paste>"  (or via repo Settings → Secrets)
#
# After that: every push to main triggers a remote build on Fly's builder
# and a rolling deploy with a healthcheck. Concurrency: only one deploy at
# a time, queued (don't cancel — cancelling mid-deploy can leave a broken
# state). Manual via the "Actions" tab also works.
name: Fly Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --wait-timeout 300
