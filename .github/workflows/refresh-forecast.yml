# Keep the public forecast fresh even when Fly auto-stop lets the app sleep
# between visitors. The endpoint is intentionally no-key: all inputs are public
# data, and the job is idempotent apart from refreshing cached SQLite rows.
name: Refresh forecast

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Wake Driftless Cast
        run: |
          curl --fail --show-error --silent \
            --max-time 30 \
            https://driftless-cast.fly.dev/status
